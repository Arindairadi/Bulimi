name: bulimi_ai
description: "BulimiAI — AI-powered smart farming platform for smallholder farmers in Uganda and Africa."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- State management ---
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # --- Navigation ---
  go_router: ^14.2.0

  # --- Networking ---
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3
  pretty_dio_logger: ^1.3.1

  # --- Local / offline storage ---
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # --- Firebase ---
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  firebase_messaging: ^15.0.2
  cloud_firestore: ^5.0.2

  # --- Maps & location ---
  google_maps_flutter: ^2.6.1
  geolocator: ^12.0.0

  # --- Camera / media (for disease detection) ---
  camera: ^0.11.0+1
  image_picker: ^1.1.2
  image: ^4.2.0

  # --- Voice assistant: speech-to-text / text-to-speech ---
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.2
  permission_handler: ^11.3.1

  # --- Charts / data viz (dashboard, farm reports) ---
  fl_chart: ^0.68.0

  # --- UI / UX ---
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  intl: ^0.19.0

  # --- Utilities ---
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  logger: ^2.3.0
  dartz: ^0.10.1
  uuid: ^4.4.0
  package_info_plus: ^8.0.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # --- Code generation ---
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/

  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700
