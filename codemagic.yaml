workflows:
  android-workflow:
    name: BulimiAI Android Build
    max_build_duration: 30
    working_directory: BulimiAI/app
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --debug --dart-define=ENV=dev
    artifacts:
      - build/**/outputs/**/*.apk
